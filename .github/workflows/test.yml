name: Tests

on:
  push:
    branches: [ main, master, feat/*, fix/*, release/* ]
  pull_request:
    branches: [ main, master ]
  workflow_call:          # Allow other workflows to reuse this job

jobs:
  test:
    name: Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies (for Kivy headless)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libglx-mesa0 \
            libgles2 \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            libfreetype6-dev \
            xvfb \
            mesa-utils

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DISPLAY: ":99"
          KIVY_NO_ENV_CONFIG: "1"
        run: |
          # Start virtual display for Kivy
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          python -m pytest tests/ -v --tb=short --cache-clear

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: tests/
          retention-days: 7
