name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:        # Allows manual trigger from GitHub UI

jobs:
  test:
    name: Run Tests (pre-build)
    uses: ./.github/workflows/test.yml

  build-android:
    name: Build Android APK
    needs: test
    runs-on: ubuntu-latest
    # Only run on main/master or tags (not on PRs to save build minutes)
    if: |
      github.event_name != 'pull_request' ||
      github.base_ref == 'main' || github.base_ref == 'master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-global-

      - name: Cache Buildozer local directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-local-${{ hashFiles('buildozer.spec') }}-${{ github.sha }}
          restore-keys: |
            buildozer-local-${{ hashFiles('buildozer.spec') }}-
            buildozer-local-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            automake \
            build-essential \
            ccache \
            cmake \
            gettext \
            git \
            libffi-dev \
            libltdl-dev \
            libssl-dev \
            libtool \
            openjdk-17-jdk \
            python3-pip \
            unzip \
            zip \
            zlib1g-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==3.0.3 virtualenv

      - name: Accept Android SDK licenses
        run: |
          mkdir -p "$HOME/.android"
          touch "$HOME/.android/repositories.cfg"
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses 2>/dev/null || true
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Build APK (debug)
        run: |
          buildozer android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      # ----------------------------------------------------------------
      # OPTIONAL: Sign a release APK (uncomment when you add secrets)
      # ----------------------------------------------------------------
      # - name: Sign APK (release)
      #   if: startsWith(github.ref, 'refs/tags/')
      #   uses: r0adkll/sign-android-release@v1
      #   with:
      #     releaseDirectory: bin
      #     signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
      #     alias: ${{ secrets.ANDROID_ALIAS }}
      #     keyStorePassword: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
      #     keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ejiro-android-apk-${{ github.run_number }}
          path: bin/*.apk
          retention-days: 30

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*.apk
